name: Azure Static Web Apps CI/CD (zealous-rock-087ce330f)

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ZEALOUS_ROCK_087CE330F }}  # ← CAMBIA ESTO SI ES NECESARIO (ver abajo)
          action: "upload"
          app_location: "/"               # Raíz del repo (donde está index.html)
          api_location: ""                # Vacío: no tienes API
          output_location: ""             # Vacío: no hay build, archivos ya están listos
          # No uses skip_app_build: no existe en esta acción. Azure lo detecta solo.

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ZEALOUS_ROCK_087CE330F }}  # Mismo secreto aquí
          action: "close"
