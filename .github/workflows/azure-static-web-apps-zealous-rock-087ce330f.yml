name: Azure Static Web Apps CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches:
      - main

jobs:
  build_and_deploy_job:
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.action != 'closed')
    runs-on: ubuntu-latest
    name: Build and Deploy Job

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build And Deploy
        id: builddeploy
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ZEALOUS_ROCK087CE330F1 }}  # ← Usa EXACTAMENTE este nombre (tu secreto nuevo con F1)
          repo_token: ${{ secrets.GITHUB_TOKEN }}  # Recomendado para PRs y estabilidad
          action: "upload"
          app_location: "/"          # Raíz del repo (index.html directamente aquí)
          api_location: ""           # Vacío: no tienes API
          output_location: ""        # Vacío: no hay build, archivos estáticos ya listos

  close_pull_request_job:
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    name: Close Pull Request Job
    steps:
      - name: Close Pull Request
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_ZEALOUS_ROCK087CE330F1 }}  # Mismo secreto con F1
          action: "close"
