<svg width="600" height="200" viewBox="0 0 600 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Background transparent -->
  <defs>
    <linearGradient id="neonGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DEA3D4" />
      <stop offset="50%" stop-color="#9D1C8F" />
      <stop offset="100%" stop-color="#641A63" />
    </linearGradient>
    <filter id="neonGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="1.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <!-- Isotipo: A stylized 'C' or flower/butterfly with lines -->
  <g transform="translate(40, 45)" filter="url(#neonGlow)">
    <path d="M 50 0 C 10 0, -10 30, -10 50 C -10 70, 10 100, 50 100 C 30 70, 30 30, 50 0 Z" fill="#9D1C8F"/>
    <path d="M 55 10 C 70 10, 90 30, 90 50 C 90 70, 70 90, 55 90 C 65 70, 65 30, 55 10 Z" fill="#DEA3D4"/>
    <circle cx="52" cy="50" r="8" fill="#FFFFFF"/>
    <path d="M 52 50 L 100 20" stroke="#35D07F" stroke-width="2" />
  </g>
  <!-- Texto -->
  <text x="160" y="105" font-family="'Montserrat', sans-serif" font-size="64" font-weight="700" fill="#FFFFFF" filter="url(#neonGlow)">
    studiobycote
  </text>
  <text x="165" y="145" font-family="'Montserrat', sans-serif" font-size="16" font-weight="300" fill="#DEA3D4" letter-spacing="5">
    CEJAS • PESTAÑAS • LABIOS
  </text>
</svg>
