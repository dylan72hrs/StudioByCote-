<svg width="500" height="120" viewBox="0 0 500 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="neonGlowText" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feComponentTransfer in="blur" result="glow">
        <feFuncA type="linear" slope="1.5" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="glow" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  <text x="250" y="80" font-family="'Montserrat', sans-serif" font-size="68" font-weight="700" fill="#FFFFFF" text-anchor="middle" filter="url(#neonGlowText)">
    studiobycote
  </text>
</svg>
